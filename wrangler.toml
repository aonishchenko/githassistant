name = "githassistant"
main = "src/platforms/cloudflare/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "GITHASSISTANT_KV"
# id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[d1_databases]]
binding = "GITHASSISTANT_DB"
database_name = "githassistant-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[triggers]
crons = ["30 23 * * *"]

[[queues.producers]]
queue = "githassistant-queue"
binding = "BOT_QUEUE"

[[queues.consumers]]
queue = "githassistant-queue"
max_batch_size = 1
max_batch_timeout = 0
max_retries = 2

[observability.logs]
enabled = true
invocation_logs = true
